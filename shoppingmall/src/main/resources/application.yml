spring:
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
      enabled: true
  profiles:
    active: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-milliseconds: ${JWT_ACCESS_TOKEN_VALIDITY_IN_MILLISECONDS}

cookie:
  secure: ${COOKIE_SECURE}
  sameSite: ${COOKIE_SAMESITE}

cloud:
  aws:
    credentials:
      access-Key: ${CLOUD_AWS_CREDENTIALS_ACCESS-KEY}
      secret-Key: ${CLOUD_AWS_CREDENTIALS_SECRET-KEY}
    s3:
      bucket: ${CLOUD_AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    stack:
      auto: false

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}

naver:
  client-id: ${NAVER_CLIENT_ID}
  redirect-uri: ${NAVER_REDIRECT_URI}
  client-secret: ${NAVER_CLIENT_SECRET}

mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000
  auth-code-expiration-millis: 1800000

imp:
  api:
    client-code: ${IMP_API_CLIENT_CODE}
    key: ${IMP_API_KEY}
    secret-key: ${IMP_API_SECRET_KEY}

gemini:
  api:
    key: ${GEMINI_API_KEY}

openweather:
  api:
    key: ${OPENWEATHERMAP_API_KEY}
